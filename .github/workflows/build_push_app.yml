name: Build & Push Image to ACR 

permissions:
  contents: read
  id-token: write

on: 
  workflow_dispatch:
    {}
  push:
    branches: [main]
    paths: [app/**, Dockerfile, .github/workflows/build_push_app.yml, registered_model.dvc]
  
jobs:
  build-push:
    name: MAIN - push image to ACR
    runs-on: ubuntu-latest
    environment: Production 
    env:
      RESOURCE_GROUP: container-rg
      CONTAINER_APP_NAME: chicago-ticket
    steps:
      - name: Repo Checkout 
        uses: actions/checkout@v3
      # - name: Login to azure 
      #   uses: azure/login@v1
      #   with: 
      #     client-id: ${{secrets.AZURE_CLIENT_ID}}
      #     tenant-id: ${{secrets.AZURE_TENANT_ID}}
      #     subscription-id: ${{secrets.AZURE_SUBSCRIPTION_ID}}
      #     enable-AzPSSession: true
      # - name: Login to ACR 
      #   run: az acr login --name ${{secrets.ACR_NAME}}
      - name: Pull model from DVC
        run: |
          pip install dvc[azure]
          dvc remote modify myremote account_name "${{secrets.AZURE_STORAGE_ACCOUNT}}"
          dvc remote modify myremote sas_token "${{secrets.AZURE_STORAGE_SAS_TOKEN}}"
          dvc remote list
          cat .dvc/config
          dvc pull registered_model.dvc -v
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{secrets.ACR_LOGIN_SERVER}}
          username: ${{secrets.ACR_USERNAME}}
          password: ${{secrets.ACR_PASSWORD}}
      - name: Build app image
        run: |
          docker build -t ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:${{github.sha}} \
                       -t ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:latest .
          docker push ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:${{github.sha}}
          docker push ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:latest
      # - name: Deploy to Container Apps # need az login with sp
      #   run: |
      #     az containerapp update \
      #     --name ${{env.CONTAINER_APP_NAME}} \
      #     --resource-group ${{env.RESOURCE_GROUP}} \
      #     --image ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:${{github.sha}} 
      - name: Update Container apps
        uses: azure/container-apps-deploy-action@v1
        with: 
          acrName: ${{secrets.ACR_NAME}}
          acrUsername: ${{secrets.ACR_USERNAME}}
          acrPassword: ${{secrets.ACR_PASSWORD}}
          containerAppName: ${{env.CONTAINER_APP_NAME}}
          resourceGroup: ${{env.RESOURCE_GROUP}}
          imageToDeploy: ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:${{github.sha}}