name: Build & Push App to Container Apps

permissions:
  contents: read
  id-token: write

on: 
  workflow_dispatch:
    {}
  push:
    branches: [main]
    paths: [app/**, Dockerfile, registered_model.dvc]
  
jobs:
  tests:
    name: Main - test before building image 
    runs-on: ubuntu-latest
    environment: Production 
    steps: 
      - uses: actions/checkout@v3 
      - uses: actions/setup-python@v4
        with: 
          python-version: '3.10'
      - run: |
          pip install dvc[azure]
          dvc remote modify myremote account_name "${{secrets.AZURE_STORAGE_ACCOUNT}}"
          dvc remote modify myremote account_key "${{secrets.AZURE_STORAGE_ACCOUNT_KEY}}"
          dvc pull registered_model.dvc
      - run: |
          pip install -r app/requirements.txt -r app/requirements-test.txt 
          PYTHONPATH=app python -m pytest app/tests/

  build-push:
    name: MAIN - push image to ACR
    needs: tests
    runs-on: ubuntu-latest
    environment: Production 
    env:
      RESOURCE_GROUP: container-rg
      CONTAINER_APP_NAME: chicago-ticket
    steps:
      - name: Repo Checkout 
        uses: actions/checkout@v3
      # - name: Login to azure 
      #   uses: azure/login@v1
      #   with: 
      #     client-id: ${{secrets.AZURE_CLIENT_ID}}
      #     tenant-id: ${{secrets.AZURE_TENANT_ID}}
      #     subscription-id: ${{secrets.AZURE_SUBSCRIPTION_ID}}
      #     enable-AzPSSession: true
      # - name: Login to ACR 
      #   run: az acr login --name ${{secrets.ACR_NAME}}
      - name: Pull model from DVC
        run: |
          pip install dvc[azure]
          dvc remote modify myremote account_name "${{secrets.AZURE_STORAGE_ACCOUNT}}"
          dvc remote modify myremote account_key "${{secrets.AZURE_STORAGE_ACCOUNT_KEY}}"
          dvc pull registered_model.dvc -v
      - name: Get Model version from DVC
        id: model_ver
        run: |
          MODEL_HASH=$(python -c "
          import yaml
          d = yaml.safe_load(open('registered_model.dvc'))
          print(d['outs'][0]['md5'][:8])
          ")
          echo "hash=$MODEL_HASH" >> $GITHUB_OUTPUT
      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{secrets.ACR_LOGIN_SERVER}}
          username: ${{secrets.ACR_USERNAME}}
          password: ${{secrets.ACR_PASSWORD}}
      - name: Build app image
        run: |
          docker build -t ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:${{github.sha}} \
                       -t ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:model-${{steps.model_ver.outputs.hash}} \
                       -t ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:latest .
          docker push ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:${{github.sha}}
          docker push ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:model-${{steps.model_ver.outputs.hash}}
          docker push ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:latest
      # - name: Deploy to Container Apps # need az login with sp
      #   run: |
      #     az containerapp update \
      #     --name ${{env.CONTAINER_APP_NAME}} \
      #     --resource-group ${{env.RESOURCE_GROUP}} \
      #     --image ${{secrets.ACR_LOGIN_SERVER}}/chicagoticket-app:${{github.sha}} \
      #     --set-env-vars AZURE_STORAGE_ACCOUNT=${{secrets.AZURE_STORAGE_ACCOUNT}} AZURE_STORAGE_KEY=${{secrets.AZURE_STORAGE_KEY}}
